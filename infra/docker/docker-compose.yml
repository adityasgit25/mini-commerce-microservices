services:

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -pmysql123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 12

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"

  discovery-server:
    image: mini-commerce/discovery-server:latest
    build:
      context: ../..
      dockerfile: discovery-server/Dockerfile
    ports:
      - "8761:8761"

  product-service:
    image: mini-commerce/product-service:latest
    build:
      context: ../..
      dockerfile: product-service/Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: product_db
      MYSQL_PASSWORD: mysql123
      REDIS_HOST: redis
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_started

  order-service:
    image: mini-commerce/order-service:latest
    build:
      context: ../..
      dockerfile: order-service/Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: order_db
      MYSQL_PASSWORD: mysql123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_started
      discovery-server:
        condition: service_started

  inventory-service:
    image: mini-commerce/inventory-service:latest
    build:
      context: ../..
      dockerfile: inventory-service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_started

  user-service:
    image: mini-commerce/user-service:latest
    build:
      context: ../..
      dockerfile: user-service/Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: user_db
      MYSQL_PASSWORD: mysql123
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  mysql-data:
